<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>咱兜的台語 — 台語友善環境推薦系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
/* ============ CSS VARIABLES ============ */
:root {
  --ink: #1a1208;
  --bamboo: #3d6b4f;
  --bamboo-light: #5a9470;
  --bamboo-pale: #d4e8db;
  --earth: #c4622d;
  --earth-light: #e8895a;
  --earth-pale: #f5ddd0;
  --rice: #f7f2e8;
  --rice-dark: #ede5d0;
  --gold: #c9983a;
  --gold-light: #f0cb6a;
  --sky: #4a7fa5;
  --sky-pale: #d0e4f0;
  --text: #2d2010;
  --text-muted: #7a6a50;
  --border: #d5c9b0;
  --shadow: rgba(61,107,79,0.15);
  --radius: 12px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--rice);
  color: var(--text);
  min-height: 100vh;
}

/* grain texture */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9998; opacity: 0.5;
}

/* ============ LOADING SCREEN ============ */
#loadingScreen {
  position: fixed; inset: 0;
  background: var(--bamboo);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 99999;
  transition: opacity 0.5s ease;
}
#loadingScreen.hide { opacity: 0; pointer-events: none; }

.loading-logo {
  font-family: 'Noto Serif TC', serif;
  font-size: 2.5rem;
  font-weight: 900;
  color: white;
  margin-bottom: 0.3rem;
}
.loading-sub {
  color: var(--gold-light);
  font-size: 0.85rem;
  letter-spacing: 0.15em;
  margin-bottom: 2.5rem;
}
.loading-bar-wrap {
  width: 200px; height: 3px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px; overflow: hidden;
}
.loading-bar {
  height: 100%;
  background: var(--gold-light);
  border-radius: 2px;
  animation: loadBar 1.8s ease-in-out forwards;
}
@keyframes loadBar { from { width: 0; } to { width: 100%; } }

/* ============ HEADER ============ */
header {
  background: var(--bamboo);
  color: white;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 20px var(--shadow);
}
.header-inner {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0 2rem; height: 60px;
  max-width: 1400px; margin: 0 auto;
}
.logo {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none; color: inherit;
}
.logo-icon {
  width: 36px; height: 36px;
  background: var(--gold); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; flex-shrink: 0;
}
.logo-text { font-family: 'Noto Serif TC', serif; font-weight: 900; font-size: 1.1rem; }
.logo-eng { font-size: 0.62rem; opacity: 0.7; font-weight: 300; letter-spacing: 0.06em; }

nav { display: flex; }
nav button {
  background: none; border: none; border-bottom: 3px solid transparent;
  color: rgba(255,255,255,0.72);
  font-family: 'Noto Sans TC', sans-serif; font-size: 0.83rem;
  padding: 0 1rem; height: 60px; cursor: pointer;
  transition: all 0.2s;
}
nav button:hover { color: white; background: rgba(255,255,255,0.07); }
nav button.active { color: var(--gold-light); border-bottom-color: var(--gold-light); }

/* ============ LINE AUTH BAR ============ */
#authBar {
  background: var(--ink);
  padding: 0.45rem 2rem;
  display: flex; align-items: center; gap: 1rem;
}
.auth-inner { max-width: 1400px; margin: 0 auto; width: 100%; display: flex; align-items: center; gap: 1rem; }
#authStatus { font-size: 0.78rem; color: rgba(255,255,255,0.6); }
#authStatus strong { color: var(--gold-light); }
.auth-btn {
  font-size: 0.75rem; padding: 0.3rem 0.8rem;
  border-radius: 6px; border: none; cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif; font-weight: 500;
  transition: all 0.2s;
}
.auth-btn-login { background: #06c755; color: white; }
.auth-btn-login:hover { background: #05b04c; }
.auth-btn-logout { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.6); }
.auth-btn-logout:hover { background: rgba(255,255,255,0.2); }
.admin-badge {
  font-size: 0.68rem; background: var(--gold);
  color: var(--ink); padding: 0.15rem 0.5rem;
  border-radius: 4px; font-weight: 700;
}

/* ============ HERO ============ */
.hero {
  background: linear-gradient(140deg, #243d30 0%, #3d6b4f 55%, #4e7d62 100%);
  padding: 2.5rem 2rem;
  position: relative; overflow: hidden;
}
.hero-bg-text {
  position: absolute; font-family: 'Noto Serif TC', serif;
  font-size: 10rem; font-weight: 900; opacity: 0.035;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  white-space: nowrap; pointer-events: none; color: white;
  letter-spacing: 0.2em;
}
.hero-inner { max-width: 1400px; margin: 0 auto; color: white; }
.hero h1 { font-family: 'Noto Serif TC', serif; font-size: 1.8rem; font-weight: 900; margin-bottom: 0.3rem; }
.hero p { opacity: 0.75; font-size: 0.9rem; margin-bottom: 1.5rem; }
.api-status-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; margin-right: 5px;
  background: #aaa; vertical-align: middle;
}
.api-status-dot.online { background: #4caf50; animation: pulse 2s infinite; }
.api-status-dot.error  { background: var(--earth); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.stats-row { display: flex; gap: 1.2rem; flex-wrap: wrap; }
.stat-box {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 10px; padding: 0.7rem 1.3rem;
  backdrop-filter: blur(6px);
  animation: fadeUp 0.5s ease both;
  min-width: 90px;
}
.stat-box:nth-child(n) { animation-delay: calc(var(--i,0) * 0.08s); }
.stat-num {
  font-family: 'Space Mono', monospace; font-size: 1.7rem;
  font-weight: 700; color: var(--gold-light); line-height: 1;
}
.stat-num.loading-val { color: rgba(255,255,255,0.3); }
.stat-label { font-size: 0.7rem; opacity: 0.75; margin-top: 3px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ============ MAIN ============ */
main { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
.page { display: none; }
.page.active { display: block; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ============ SHARED COMPONENTS ============ */
.section-title {
  font-family: 'Noto Serif TC', serif; font-size: 1.2rem;
  font-weight: 700; color: var(--bamboo);
  margin-bottom: 1rem; padding-bottom: 0.5rem;
  border-bottom: 2px solid var(--bamboo-pale);
  display: flex; align-items: center; gap: 0.5rem;
}
.section-title::before {
  content: ''; width: 4px; height: 1.1rem;
  background: var(--bamboo); border-radius: 2px;
}

.card {
  background: white; border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: 0 2px 10px var(--shadow);
}

.btn {
  display: inline-flex; align-items: center; gap: 0.35rem;
  padding: 0.5rem 1rem; border: none; border-radius: 8px;
  font-family: 'Noto Sans TC', sans-serif; font-size: 0.83rem;
  font-weight: 500; cursor: pointer; transition: all 0.2s;
}
.btn-primary { background: var(--bamboo); color: white; }
.btn-primary:hover:not(:disabled) { background: var(--bamboo-light); transform: translateY(-1px); }
.btn-earth { background: var(--earth); color: white; }
.btn-earth:hover:not(:disabled) { background: var(--earth-light); }
.btn-outline { background: transparent; border: 1.5px solid var(--bamboo); color: var(--bamboo); }
.btn-outline:hover:not(:disabled) { background: var(--bamboo-pale); }
.btn-gold { background: var(--gold); color: var(--ink); }
.btn-gold:hover:not(:disabled) { background: var(--gold-light); }
.btn-ghost { background: rgba(0,0,0,0.05); color: var(--text-muted); }
.btn-ghost:hover:not(:disabled) { background: rgba(0,0,0,0.1); }
.btn-sm { padding: 0.3rem 0.7rem; font-size: 0.77rem; }
.btn-full { width: 100%; justify-content: center; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

select, input[type=text], textarea {
  width: 100%; padding: 0.5rem 0.7rem;
  border: 1px solid var(--border); border-radius: 8px;
  font-family: 'Noto Sans TC', sans-serif; font-size: 0.85rem;
  background: var(--rice); color: var(--text); outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
select:focus, input:focus, textarea:focus {
  border-color: var(--bamboo);
  box-shadow: 0 0 0 3px rgba(61,107,79,0.12);
}
textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

.badge {
  font-size: 0.63rem; padding: 0.18rem 0.5rem;
  border-radius: 4px; font-weight: 600; white-space: nowrap;
}
.badge-approved { background: var(--bamboo-pale); color: var(--bamboo); }
.badge-pending  { background: var(--earth-pale); color: var(--earth); }
.badge-rejected { background: #f5e0e0; color: #a33; }
.badge-blue     { background: var(--sky-pale); color: var(--sky); }

/* ============ MAP PAGE ============ */
.map-layout {
  display: grid; grid-template-columns: 320px 1fr;
  gap: 1.2rem; height: calc(100vh - 230px); min-height: 480px;
}
.map-sidebar { display: flex; flex-direction: column; gap: 0.8rem; overflow: hidden; }

.filter-card { padding: 1rem; }

.label-sm { font-size: 0.72rem; color: var(--text-muted); font-weight: 500; letter-spacing: 0.04em; display: block; margin-bottom: 3px; }
.field-row { display: flex; gap: 0.5rem; margin-bottom: 0.6rem; }
.field-row > * { flex: 1; }

.node-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; padding-right: 2px; }

.node-card {
  background: white; border-radius: 10px;
  border: 1.5px solid var(--border);
  padding: 0.85rem; cursor: pointer; transition: all 0.18s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.node-card:hover { border-color: var(--bamboo); transform: translateX(3px); box-shadow: 0 3px 12px var(--shadow); }
.node-card.selected { border-color: var(--bamboo); background: var(--bamboo-pale); }

.nc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.3rem; }
.nc-id { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--text-muted); }
.nc-name { font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: 0.9rem; color: var(--text); margin-bottom: 0.2rem; }
.nc-addr { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 0.5rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nc-foot { display: flex; align-items: center; gap: 0.5rem; }

.score-bar { height: 5px; background: var(--rice-dark); border-radius: 3px; overflow: hidden; flex: 1; }
.score-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--bamboo), var(--bamboo-light)); transition: width 0.8s ease; }
.score-num { font-family: 'Space Mono', monospace; font-size: 0.72rem; color: var(--bamboo); font-weight: 700; }

.map-wrap { border-radius: 14px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 4px 20px var(--shadow); }
#map { height: 100%; }

/* ============ RANKING PAGE ============ */
.ranking-layout { display: grid; grid-template-columns: 1fr 300px; gap: 1.2rem; }

.table-card { overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
thead { background: var(--bamboo); color: white; }
thead th { padding: 0.8rem 1rem; text-align: left; font-weight: 500; font-size: 0.77rem; letter-spacing: 0.04em; }
tbody tr { border-bottom: 1px solid var(--rice-dark); transition: background 0.15s; }
tbody tr:hover { background: var(--rice); }
tbody td { padding: 0.7rem 1rem; vertical-align: middle; }

.rank-num { font-family: 'Space Mono', monospace; font-size: 1.05rem; font-weight: 700; }
.rank-1 { color: var(--gold); } .rank-2 { color: #999; } .rank-3 { color: #cd7f32; }

.score-pill {
  background: var(--bamboo-pale); color: var(--bamboo);
  font-family: 'Space Mono', monospace; font-size: 0.82rem;
  font-weight: 700; padding: 0.2rem 0.55rem; border-radius: 5px;
  display: inline-block; min-width: 42px; text-align: center;
}
.vote-btn {
  display: inline-flex; align-items: center; gap: 3px;
  background: var(--earth-pale); color: var(--earth);
  border: 1px solid rgba(196,98,45,0.3); border-radius: 6px;
  padding: 0.22rem 0.6rem; font-size: 0.76rem; font-weight: 600;
  cursor: pointer; transition: all 0.18s;
  font-family: 'Noto Sans TC', sans-serif;
}
.vote-btn:hover { background: var(--earth); color: white; }
.vote-btn.voted { background: var(--earth); color: white; cursor: default; }

.rank-sidebar { display: flex; flex-direction: column; gap: 0.8rem; }
.info-card { padding: 1.1rem; }
.info-card h3 { font-family: 'Noto Serif TC', serif; font-size: 0.9rem; font-weight: 700; color: var(--bamboo); margin-bottom: 0.8rem; }

.chart-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.45rem; font-size: 0.75rem; }
.chart-label { width: 50px; text-align: right; color: var(--text-muted); font-size: 0.7rem; flex-shrink: 0; }
.bar-outer { flex: 1; height: 18px; background: var(--rice-dark); border-radius: 3px; overflow: hidden; }
.bar-inner { height: 100%; border-radius: 3px; display: flex; align-items: center; padding: 0 5px; font-size: 0.68rem; font-weight: 700; color: white; transition: width 1.4s ease; }

/* ============ NODE DETAIL ============ */
.detail-layout { display: grid; grid-template-columns: 1fr 340px; gap: 1.2rem; }

.detail-main-card { padding: 1.4rem; }
.detail-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--rice-dark); }
.detail-title-wrap h2 { font-family: 'Noto Serif TC', serif; font-size: 1.4rem; font-weight: 900; margin-bottom: 0.4rem; }
.detail-badges { display: flex; gap: 0.4rem; flex-wrap: wrap; }

.score-ring {
  width: 76px; height: 76px; border-radius: 50%; flex-shrink: 0;
  background: conic-gradient(var(--bamboo) calc(var(--pct) * 3.6deg), var(--rice-dark) 0);
  display: flex; align-items: center; justify-content: center; position: relative;
}
.score-ring::before {
  content: ''; position: absolute; width: 58px; height: 58px;
  border-radius: 50%; background: white;
}
.score-ring-inner { position: relative; z-index: 1; text-align: center; line-height: 1; }
.score-big { font-family: 'Space Mono', monospace; font-size: 1.25rem; font-weight: 700; color: var(--bamboo); }
.score-big-sub { font-size: 0.58rem; color: var(--text-muted); }

.info-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; margin-bottom: 1rem; }
.info-field label { font-size: 0.68rem; color: var(--text-muted); letter-spacing: 0.04em; display: block; margin-bottom: 2px; }
.info-field span { font-size: 0.88rem; font-weight: 500; }

.score-breakdown { margin-top: 1rem; }
.sb-label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.6rem; }
.sb-row { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 0.5rem; }
.sb-name { font-size: 0.77rem; color: var(--text-muted); width: 90px; flex-shrink: 0; }
.sb-bar { flex: 1; height: 7px; background: var(--rice-dark); border-radius: 4px; overflow: hidden; }
.sb-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }
.fill-bamboo { background: var(--bamboo); } .fill-earth { background: var(--earth); }
.fill-gold { background: var(--gold); } .fill-sky { background: var(--sky); }
.sb-val { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--text-muted); width: 28px; text-align: right; }

.ai-box {
  background: linear-gradient(135deg, #e8f2ff, #f0f8ff);
  border: 1px solid #b8d4f0; border-radius: 10px;
  padding: 0.9rem; margin-top: 1rem;
}
.ai-box h4 { font-size: 0.82rem; color: var(--sky); font-weight: 700; margin-bottom: 0.4rem; }
.ai-box p  { font-size: 0.78rem; color: var(--text-muted); line-height: 1.6; }

.detail-side { display: flex; flex-direction: column; gap: 0.8rem; }
.side-card { padding: 1.1rem; }
.side-card h4 { font-family: 'Noto Serif TC', serif; font-size: 0.88rem; font-weight: 700; color: var(--bamboo); margin-bottom: 0.8rem; }

.photo-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.4rem; }
.photo-slot {
  aspect-ratio: 1; border-radius: 7px; overflow: hidden;
  background: var(--rice-dark); border: 1px dashed var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; color: var(--text-muted); cursor: pointer;
  transition: all 0.2s;
}
.photo-slot:hover { background: var(--bamboo-pale); }
.photo-slot img { width: 100%; height: 100%; object-fit: cover; }

/* ============ ADMIN ============ */
.admin-layout { display: grid; grid-template-columns: 220px 1fr; gap: 1.2rem; min-height: 600px; }
.admin-nav { overflow: hidden; }
.admin-nav-title {
  background: var(--ink); color: var(--gold-light);
  font-family: 'Noto Serif TC', serif; font-size: 0.82rem; font-weight: 700;
  padding: 0.85rem 1.1rem; letter-spacing: 0.08em;
}
.admin-nav-btn {
  display: flex; align-items: center; gap: 0.6rem;
  width: 100%; padding: 0.75rem 1.1rem;
  border: none; background: none;
  font-family: 'Noto Sans TC', sans-serif; font-size: 0.83rem;
  color: var(--text); cursor: pointer; text-align: left;
  border-left: 3px solid transparent; transition: all 0.15s;
}
.admin-nav-btn:hover  { background: var(--rice); color: var(--bamboo); }
.admin-nav-btn.active { background: var(--bamboo-pale); color: var(--bamboo); font-weight: 600; border-left-color: var(--bamboo); }
.n-badge { margin-left: auto; background: var(--earth); color: white; font-size: 0.63rem; font-weight: 700; padding: 0.12rem 0.4rem; border-radius: 8px; min-width: 18px; text-align: center; }

.admin-body { padding: 1.4rem; }

.pending-item {
  background: var(--rice); border: 1px solid var(--border); border-radius: 10px;
  padding: 1rem; margin-bottom: 0.7rem; transition: box-shadow 0.2s;
}
.pending-item:hover { box-shadow: 0 3px 12px var(--shadow); }
.pi-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.4rem; }
.pi-id { font-family: 'Space Mono', monospace; font-size: 0.67rem; color: var(--text-muted); }
.pi-name { font-family: 'Noto Serif TC', serif; font-size: 0.97rem; font-weight: 700; }
.pi-meta { font-size: 0.73rem; color: var(--text-muted); margin-bottom: 0.4rem; }
.pi-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.55; margin-bottom: 0.7rem; }

.score-inputs { display: grid; grid-template-columns: repeat(5,1fr); gap: 0.5rem; margin-bottom: 0.7rem; }
.score-input-box label { font-size: 0.67rem; color: var(--text-muted); display: block; margin-bottom: 3px; }
.score-input-box input { padding: 0.35rem 0.5rem; font-size: 0.82rem; text-align: center; }

.action-row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
.reject-input { flex: 1; min-width: 140px; padding: 0.38rem 0.7rem; font-size: 0.8rem; }

/* ============ SETTINGS ============ */
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.setting-card { padding: 1.2rem; }
.setting-card h3 { font-family: 'Noto Serif TC', serif; font-size: 0.92rem; font-weight: 700; color: var(--bamboo); margin-bottom: 0.8rem; }
.setting-row { margin-bottom: 0.7rem; }
.setting-row label { font-size: 0.72rem; color: var(--text-muted); display: block; margin-bottom: 3px; }
.code-box { background: var(--ink); color: var(--gold-light); font-family: 'Space Mono', monospace; font-size: 0.78rem; padding: 0.6rem 0.8rem; border-radius: 7px; margin-top: 0.5rem; overflow-x: auto; white-space: nowrap; }

/* ============ EMPTY / ERROR STATES ============ */
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
.empty-state .icon { font-size: 2.5rem; opacity: 0.4; margin-bottom: 0.8rem; }
.empty-state p { font-size: 0.88rem; }

.error-banner {
  background: #fff0f0; border: 1px solid #ffb3b3;
  border-radius: 10px; padding: 1rem 1.2rem;

<script>
// ============================================================
// ★ CONFIG — 修改這裡
// ============================================================
const CONFIG = {
  // GAS 後端 URL（部署後貼上）
  GAS_URL: 'https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec',

  // LINE Login Channel ID（在 LINE Developers 取得）

  // 本頁網址（用於 LINE Login 回調）
  REDIRECT_URI: 'https://chernben-git.github.io/taiwanigi-nodes/',

  // 模擬模式（GAS_URL 未設定時啟用）
  DEMO_MODE: false,
};

// ============================================================
// STATE
// ============================================================
let state = {
  nodes: [],
  filtered: [],
  stats: {},
  user: null,      // { userId, displayName, pictureUrl }
  isAdmin: false,
  votedNodes: new Set(JSON.parse(localStorage.getItem('votedNodes') || '[]')),
  map: null,
  markers: [],
  loaded: false,
};

const COUNTY_COLORS = {
  '彰化縣':'#3d6b4f','嘉義縣':'#c4622d','台南市':'#c9983a',
  '高雄市':'#4a7fa5','台北市':'#7a4faa','台中市':'#5a9470',
  '屏東縣':'#8b4513','新北市':'#2e7d8a','桃園市':'#b06040',
};

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
  initNav();
  initMap();
  await handleLineCallback(); // 處理 LINE Login 回調
  restoreSession();
  await loadData();
  hideLoading();
});

function hideLoading() {
  setTimeout(() => {
    const el = document.getElementById('loadingScreen');
    el.classList.add('hide');
    setTimeout(() => el.remove(), 600);
  }, 1800);
}

// ============================================================
// NAVIGATION
// ============================================================
function initNav() {
  document.querySelectorAll('nav button[data-page]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + btn.dataset.page).classList.add('active');
      if (btn.dataset.page === 'map') setTimeout(() => state.map?.invalidateSize(), 50);
      if (btn.dataset.page === 'ranking') renderRanking();
      if (btn.dataset.page === 'admin') { adminSection('pending', document.querySelector('.admin-nav-btn')); }
    });
  });
}

function goToPage(page) {
  const btn = document.querySelector(`nav button[data-page="${page}"]`);
  if (btn) btn.click();
}

// ============================================================
// API LAYER
// ============================================================
async function api(params, method = 'GET', body = null) {
  if (CONFIG.DEMO_MODE || !CONFIG.GAS_URL.includes('script.google.com')) {
    return demoApi(params, body);
  }
  try {
    let url = CONFIG.GAS_URL;
    if (method === 'GET') {
      const q = new URLSearchParams(params);
      if (state.user) q.set('line_user_id', state.user.userId);
      url += '?' + q.toString();
      const res = await fetch(url);
      return await res.json();
    } else {
      const payload = { ...body, line_user_id: state.user?.userId };
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      return await res.json();
    }
  } catch (err) {
    console.error('API Error:', err);
    return { error: err.message };
  }
}

// ============================================================
// DEMO DATA（GAS 未接時使用）
// ============================================================
const DEMO_NODES = [
  { node_id:'NODE-001', name:'台灣基督長老教會彰化中會', address:'彰化縣彰化市光復路42號', county:'彰化縣', type:'宗教場所', status:'approved', score:92, score_sign:85, score_service:90, score_material:95, score_evidence:88, votes:47, lat:24.080, lng:120.541, description:'彰化中會長期推動台語禮拜，所有週報皆以台語漢字印刷。', submitted_at:'2024-01-10', photo_urls:[] },
  { node_id:'NODE-002', name:'嘉義新港奉天宮', address:'嘉義縣新港鄉新民路53號', county:'嘉義縣', type:'宗教場所', status:'approved', score:88, score_sign:80, score_service:92, score_material:78, score_evidence:82, votes:61, lat:23.551, lng:120.348, description:'廟宇所有廣播均使用台語，工作人員皆能以流利台語接待。', submitted_at:'2024-01-15', photo_urls:[] },
  { node_id:'NODE-003', name:'台南赤崁文化園區', address:'台南市中西區民族路二段212號', county:'台南市', type:'文化場所', status:'approved', score:85, score_sign:88, score_service:78, score_material:90, score_evidence:80, votes:38, lat:23.002, lng:120.203, description:'園區設置台語導覽語音，定期舉辦台語說故事活動。', submitted_at:'2024-02-01', photo_urls:[] },
  { node_id:'NODE-004', name:'高雄旗山老街文化協會', address:'高雄市旗山區中山路39號', county:'高雄市', type:'文化場所', status:'approved', score:79, score_sign:75, score_service:82, score_material:70, score_evidence:78, votes:29, lat:22.886, lng:120.489, description:'老街店家多以台語接待，積極推動台語導覽志工培訓。', submitted_at:'2024-02-10', photo_urls:[] },
  { node_id:'NODE-005', name:'台北大稻埕霞海城隍廟', address:'台北市大同區迪化街一段61號', county:'台北市', type:'宗教場所', status:'approved', score:76, score_sign:70, score_service:78, score_material:68, score_evidence:75, votes:52, lat:25.055, lng:121.509, description:'廟方保留傳統台語祭典儀式。', submitted_at:'2024-02-20', photo_urls:[] },
  { node_id:'NODE-006', name:'新北淡水阿給文化故事館', address:'新北市淡水區真理街15號', county:'新北市', type:'商業店家', status:'pending', score:0, score_sign:0, score_service:0, score_material:0, score_evidence:0, votes:0, lat:25.173, lng:121.438, description:'店家老闆堅持用台語接待，收藏大量台語文化文物。', submitted_at:'2024-03-01', photo_urls:[] },
  { node_id:'NODE-007', name:'彰化鹿港民俗文物館', address:'彰化縣鹿港鎮館前街152號', county:'彰化縣', type:'文化場所', status:'pending', score:0, score_sign:0, score_service:0, score_material:0, score_evidence:0, votes:0, lat:24.048, lng:120.430, description:'館內解說員提供台語導覽。', submitted_at:'2024-03-05', photo_urls:[] },
];

function demoApi(params, body) {
  const action = params?.action || body?.action;
  if (action === 'getStats') {
    const approved = DEMO_NODES.filter(n => n.status === 'approved');
    const counties = {};
    const types = {};
    approved.forEach(n => {
      counties[n.county] = (counties[n.county]||0)+1;
      types[n.type] = (types[n.type]||0)+1;
    });
    return { success:true, stats:{ total:DEMO_NODES.length, approved:approved.length, pending:DEMO_NODES.filter(n=>n.status==='pending').length, total_votes:DEMO_NODES.reduce((s,n)=>s+n.votes,0), counties, types } };
  }
  if (action === 'getNodes') {
    let nodes = [...DEMO_NODES];
    if (params?.status) nodes = nodes.filter(n => n.status === params.status);
    return { success:true, nodes };
  }
  if (action === 'getNode') return { success:true, node: DEMO_NODES.find(n=>n.node_id===params.node_id) };
  if (action === 'vote') {
    const n = DEMO_NODES.find(n=>n.node_id===body?.node_id||params?.node_id);
    if (n) n.votes++;
    return { success:true };
  }
  if (action === 'approveNode') {
    const n = DEMO_NODES.find(n=>n.node_id===body?.node_id);
    if (n) { n.status='approved'; Object.assign(n,body.scores||{}); }
    return { success:true };
  }
  if (action === 'rejectNode') {
    const n = DEMO_NODES.find(n=>n.node_id===body?.node_id);
    if (n) n.status='rejected';
    return { success:true };
  }
  return { success:true };
}

// ============================================================
// LOAD DATA
// ============================================================
async function loadData() {
  const [nodesRes, statsRes] = await Promise.all([
    api({ action:'getNodes' }),
    api({ action:'getStats' }),
  ]);

  if (nodesRes.success) {
    state.nodes = nodesRes.nodes;
    state.filtered = [...state.nodes];
    renderNodeList();
    renderMapMarkers(state.nodes);
    populateDetailSelect();
    setApiStatus(true);
  } else {
    setApiStatus(false, nodesRes.error);
  }

  if (statsRes.success) {
    const s = statsRes.stats;
    state.stats = s;
    animateNum('st-total',   s.approved);
    animateNum('st-pending', s.pending);
    animateNum('st-votes',   s.total_votes);
    animateNum('st-counties', Object.keys(s.counties||{}).length);
    document.getElementById('pendingBadge').textContent = s.pending;
    document.querySelectorAll('.stat-num').forEach(el => el.classList.remove('loading-val'));
  }
}

function animateNum(id, target) {
  const el = document.getElementById(id);
  if (!el) return;
  let current = 0;
  const step = Math.max(1, Math.ceil(target / 30));
  const iv = setInterval(() => {
    current = Math.min(current + step, target);
    el.textContent = current.toLocaleString();
    if (current >= target) clearInterval(iv);
  }, 40);
}

function setApiStatus(ok, errMsg) {
  const dot = document.getElementById('apiDot');
  const txt = document.getElementById('apiStatusText');
  if (ok) {
    dot.className = 'api-status-dot online';
    txt.textContent = CONFIG.GAS_URL.includes('script.google.com') ? '已連接 Google Sheets 資料庫' : '示範模式（尚未接 GAS）';
  } else {
    dot.className = 'api-status-dot error';
    txt.textContent = '連接失敗：' + (errMsg || '請檢查 GAS 設定');
  }
}

// ============================================================
// NODE LIST (MAP SIDEBAR)
// ============================================================
function renderNodeList() {
  const list = document.getElementById('nodeList');
  const nodes = state.filtered;
  if (!nodes.length) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>沒有符合條件的節點</p></div>';
    return;
  }
  list.innerHTML = nodes.map(n => `
    <div class="node-card" id="card-${n.node_id}" onclick="selectNode('${n.node_id}')">
      <div class="nc-header">
        <div>
          <div class="nc-id">${n.node_id}</div>
          <div class="nc-name">${n.name}</div>
        </div>
        <span class="badge badge-${n.status==='approved'?'approved':'pending'}">${n.status==='approved'?'上架':'待審'}</span>
      </div>
      <div class="nc-addr">📍 ${n.address}</div>
      <div class="nc-foot">
        ${n.status==='approved' ? `
          <div class="score-bar" style="flex:1"><div class="score-fill" style="width:${n.score}%"></div></div>
          <span class="score-num">${n.score}</span>
          <span style="font-size:0.7rem;color:var(--text-muted);margin-left:4px">👍${n.votes}</span>
        ` : `<span style="font-size:0.72rem;color:var(--text-muted)">等待審核中…</span>`}
      </div>
    </div>
  `).join('');
}

function selectNode(id) {
  document.querySelectorAll('.node-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('card-' + id)?.classList.add('selected');
  const node = state.nodes.find(n => n.node_id === id);
  if (node?.lat && state.map) {
    state.map.setView([node.lat, node.lng], 14);
    const idx = state.nodes.indexOf(node);
    state.markers[idx]?.openPopup();
  }
}

function filterNodes() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const county = document.getElementById('countyFilter').value;
  const type   = document.getElementById('typeFilter').value;
  state.filtered = state.nodes.filter(n =>
    (!q || n.name.toLowerCase().includes(q) || n.address.includes(q)) &&
    (!county || n.county === county) &&
    (!type   || n.type   === type)
  );
  renderNodeList();
  renderMapMarkers(state.filtered);
}

function resetFilter() {
  document.getElementById('searchInput').value = '';
  document.getElementById('countyFilter').value = '';
  document.getElementById('typeFilter').value = '';
  state.filtered = [...state.nodes];
  renderNodeList();
  renderMapMarkers(state.nodes);
}

// ============================================================
// MAP
// ============================================================
function initMap() {
  state.map = L.map('map').setView([23.5, 121.0], 8);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap, © CARTO', maxZoom: 19,
  }).addTo(state.map);
}

function renderMapMarkers(nodes) {
  state.markers.forEach(m => state.map.removeLayer(m));
  state.markers = [];
  nodes.forEach(node => {
    if (!node.lat || !node.lng) return;
    const color = node.status === 'approved' ? '#3d6b4f' : '#c4622d';
    const emoji = { '宗教場所':'⛪','文化場所':'🏛','商業店家':'🏪','教育機構':'🏫','政府機關':'🏢' }[node.type] || '📌';
    const icon = L.divIcon({
      html: `<div style="width:30px;height:36px;display:flex;flex-direction:column;align-items:center">
        <div style="width:28px;height:28px;background:${color};border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2.5px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center">
          <span style="transform:rotate(45deg);font-size:12px">${emoji}</span>
        </div>
      </div>`,
      className: '', iconSize:[30,36], iconAnchor:[14,36], popupAnchor:[0,-36],
    });
    const m = L.marker([node.lat, node.lng], { icon }).addTo(state.map);
    m.bindPopup(`
      <div style="font-family:'Noto Sans TC',sans-serif;min-width:190px">
        <div style="font-family:'Noto Serif TC',serif;font-weight:700;font-size:0.95rem;margin-bottom:3px">${node.name}</div>
        <div style="font-size:0.72rem;color:#7a6a50;margin-bottom:6px">${node.address}</div>
        ${node.status==='approved'
          ? `<div style="font-size:0.78rem">友善指數：<strong style="color:#3d6b4f">${node.score}</strong> ／ 票數：${node.votes}</div>`
          : `<span style="background:#f5ddd0;color:#c4622d;font-size:0.7rem;padding:2px 6px;border-radius:4px">待審核</span>`}
        <div style="margin-top:8px">

        </div>
      </div>
    `);
    state.markers.push(m);
  });
}

function renderRanking() {
  const approved = state.nodes.filter(n => n.status === 'approved').sort((a,b) => b.score - a.score);
  document.getElementById('rankingBody').innerHTML = approved.length
    ? approved.map((n, i) => `
      <tr>
        <td class="rank-num ${i<3?'rank-'+(i+1):''}">${['🥇','🥈','🥉'][i] ?? '#'+(i+1)}</td>
        <td><div style="font-weight:600;font-size:0.88rem">${n.name}</div><div style="font-size:0.68rem;color:var(--text-muted);font-family:'Space Mono',monospace">${n.node_id}</div></td>

    `).join('')
    : '<tr><td colspan="7"><div class="empty-state"><div class="icon">🏆</div><p>尚無上架節點</p></div></td></tr>';

  // County chart
  const counties = state.stats.counties || {};
  const sorted = Object.entries(counties).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const max = Math.max(...sorted.map(s=>s[1]),1);
  document.getElementById('countyChart').innerHTML = sorted.map(([c,v]) => `
    <div class="chart-row">
      <div class="chart-label">${c.replace(/[市縣]/,'')}</div>
      <div class="bar-outer"><div class="bar-inner" style="width:${(v/max)*100}%;background:${COUNTY_COLORS[c]||'#3d6b4f'}">${v}</div></div>
    </div>
  `).join('') || '<p style="font-size:0.8rem;color:var(--text-muted)">暫無資料</p>';

  // Type chart
  const types = state.stats.types || {};
  const typeColors = { '宗教場所':'#3d6b4f','商業店家':'#c4622d','文化場所':'#c9983a','政府機關':'#4a7fa5','教育機構':'#7a4faa' };

    </div>
  `).join('') || '<p style="font-size:0.8rem;color:var(--text-muted)">暫無資料</p>';
}

async function vote(nodeId, btn) {
  if (!state.user) { toast('請先登入 LINE 才能投票', 'err'); lineLogin(); return; }
  if (state.votedNodes.has(nodeId)) { toast('您已投過此節點', 'err'); return; }

  btn.disabled = true;
  const res = await api({ action:'vote', node_id: nodeId }, 'POST', { action:'vote', node_id: nodeId });
  if (res.success || res.new_votes) {
    state.votedNodes.add(nodeId);
    localStorage.setItem('votedNodes', JSON.stringify([...state.votedNodes]));
    btn.className = 'vote-btn voted';
    btn.innerHTML = '✓ 已投';
    const node = state.nodes.find(n=>n.node_id===nodeId);
    if (node) node.votes = res.new_votes || node.votes + 1;
    toast('✅ 投票成功！');
  } else {
    toast(res.error || '投票失敗', 'err');
    btn.disabled = false;
  }
}

function lineLogin() {
  if (!CONFIG.LINE_CHANNEL_ID || CONFIG.LINE_CHANNEL_ID.includes('YOUR_')) {
    // Demo mode: 模擬一般使用者
    state.user = { userId: 'U_demo_user', displayName: '示範用戶', pictureUrl: '' };
    state.isAdmin = CONFIG.ADMIN_IDS.includes(state.user.userId);
    updateAuthUI();
    toast('🟢 已以示範帳號登入（請設定真實 LINE Channel ID）');
    return;
  }
  const state_param = Math.random().toString(36).substr(2);
  sessionStorage.setItem('line_state', state_param);
  const params = new URLSearchParams({
    response_type: 'code',
    client_id: CONFIG.LINE_CHANNEL_ID,
    redirect_uri: CONFIG.REDIRECT_URI,
    state: state_param,
    scope: 'profile openid',
    nonce: Math.random().toString(36).substr(2),
  });
  window.location.href = 'https://access.line.me/oauth2/v2.1/authorize?' + params.toString();
}

async function handleLineCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const stateParam = params.get('state');
  const savedState = sessionStorage.getItem('line_state');

  if (!code) return;
  if (stateParam !== savedState) { toast('LINE 登入驗證失敗', 'err'); return; }

  // 清除 URL 參數
  window.history.replaceState({}, '', window.location.pathname);
  sessionStorage.removeItem('line_state');

  // 用 code 換 token（需透過後端，避免 client_secret 外洩）
  // 這裡呼叫 GAS 做 token exchange
  const res = await fetch(CONFIG.GAS_URL + '?action=lineTokenExchange&code=' + code + '&redirect_uri=' + encodeURIComponent(CONFIG.REDIRECT_URI));
  try {
    const data = await res.json();
    if (data.profile) {
      state.user = data.profile;
      state.isAdmin = CONFIG.ADMIN_IDS.includes(state.user.userId);
      localStorage.setItem('lineUser', JSON.stringify(state.user));
      updateAuthUI();
      toast(`🟢 歡迎，${state.user.displayName}！`);
      if (state.isAdmin) document.getElementById('adminNavBtn').style.display = '';
    }
  } catch(e) { toast('登入解析失敗', 'err'); }
}

function restoreSession() {
  const saved = localStorage.getItem('lineUser');
  if (saved) {
    try {
      state.user = JSON.parse(saved);
      state.isAdmin = CONFIG.ADMIN_IDS.includes(state.user.userId);
      updateAuthUI();
      if (state.isAdmin) document.getElementById('adminNavBtn').style.display = '';
    } catch(e) {}
  }
  // 檢查 URL ?node= 參數直接跳節點詳情
  const urlNode = new URLSearchParams(window.location.search).get('node');
  if (urlNode) { goToPage('detail'); document.getElementById('detailSelect').value = urlNode; loadDetail(urlNode); }
}

function updateAuthUI() {
  const u = state.user;
  if (!u) {
    document.getElementById('authStatus').innerHTML = '<span style="color:rgba(255,255,255,0.4)">尚未登入</span>';
    document.getElementById('loginBtn').style.display = '';
    document.getElementById('logoutBtn').style.display = 'none';
    return;
  }
  document.getElementById('authStatus').innerHTML =
    `已登入：<strong>${u.displayName}</strong>` +
    (state.isAdmin ? ' <span class="admin-badge">管理員</span>' : '');
  document.getElementById('loginBtn').style.display = 'none';
  document.getElementById('logoutBtn').style.display = '';
}

function lineLogout() {
  state.user = null; state.isAdmin = false;
  localStorage.removeItem('lineUser');
  document.getElementById('adminNavBtn').style.display = 'none';
  updateAuthUI();
  toast('已登出');
}

// ============================================================
// TOAST
// ============================================================
function toast(msg, type = 'ok') {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
</script>
</body>
</html>
